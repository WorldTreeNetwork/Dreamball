name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig:
    name: Zig — test + smoke + wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build test
        run: zig build test --summary all
      - name: zig build wasm
        run: zig build wasm
      - name: Confirm jelly.wasm ≤ 200 KB raw, ≤ 64 KB gzipped
        run: |
          raw=$(wc -c < src/lib/wasm/jelly.wasm)
          gz=$(gzip -9c src/lib/wasm/jelly.wasm | wc -c)
          echo "jelly.wasm is ${raw} bytes raw, ${gz} bytes gzipped"
          test "$raw" -le 204800
          test "$gz" -le 65536
      - name: zig build smoke
        run: zig build smoke
      - name: Upload jelly.wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: jelly.wasm
          path: src/lib/wasm/jelly.wasm
          if-no-files-found: error

  bun:
    name: Bun — check + tests + build
    runs-on: ubuntu-latest
    needs: zig
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: bun install
        run: bun install --frozen-lockfile
      - name: Rebuild WASM (deterministic)
        run: zig build wasm
      - name: bun run check
        run: bun run check
      - name: bun run test:unit
        run: bun run test:unit -- --run
      - name: bun run build
        run: bun run build
      - name: bun run build-storybook
        run: bun run build-storybook
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static
          if-no-files-found: error

  grep-no-todo-crypto-leak:
    name: Guard — no leaked secret-key fields on read routes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm secret_key_b58 is only in the mint response
        run: |
          # Whitelist: the mint route is the ONLY place secret_key_b58 is
          # legitimately returned. Every other occurrence is a bug.
          allowed='jelly-server/src/routes/mint.ts\|src/wasm_main.zig\|src/lib/wasm/write-ops.test.ts\|src/cli\|README.md\|docs/\|.omc/plans/\|CLAUDE.md\|tools/schema-gen'
          hits=$(grep -rn 'secret_key_b58' --include='*.ts' --include='*.zig' --include='*.svelte' . \
                 | grep -v "$allowed" || true)
          if [ -n "$hits" ]; then
            echo "Leak candidates:"
            echo "$hits"
            exit 1
          fi

  deploy-storybook:
    name: Deploy Storybook to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: bun
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static
      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static
      - name: Deploy
        id: pages
        uses: actions/deploy-pages@v4
